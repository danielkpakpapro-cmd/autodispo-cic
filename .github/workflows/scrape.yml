name: Scrape Auto Dispo CIC

on:
  schedule:
    # Tous les jours à 09:15 UTC (décalé de 15 min par rapport à
    # Autosphere pour éviter que les deux tournent pile en même temps)
    - cron: "15 9 * * *"
  workflow_dispatch: {}

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install requests beautifulsoup4

      - name: Scraper le catalogue
        run: python scraper.py

      - name: Committer les nouvelles données
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Mise à jour des données (auto)"
          git push
